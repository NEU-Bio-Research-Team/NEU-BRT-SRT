<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Members</title>
  <meta name="description" content="Current and alumni members of BRT-SRT Lab.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components.css">
</head>
<body>
  <header class="navbar">
    <div class="navbar__inner">
      <a href="index.html" class="nav-logo" aria-label="Bio Research Team Home">
        <span class="nav-logo__icons" aria-hidden="true">
          <img class="nav-logo__icon" src="assets/images/BRT.jpg" alt="" width="32" height="32">
          <img class="nav-logo__icon" src="assets/images/SRT.jpg" alt="" width="32" height="32">
        </span>
        <span class="nav-logo__meta">
          <span class="nav-logo__text">Bio Research Team</span>
          <span class="nav-logo__sub">National Economics University</span>
        </span>
      </a>

      <ul class="nav-links" role="list">
        <li><a href="post.html">News</a></li>
        <li><a href="publication.html">Publication</a></li>
        <li><a href="members.html" class="active">Members</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="mailto:brt-srt@neu.edu.vn?subject=Login%20Request" class="btn btn-primary nav-login">Login</a></li>
      </ul>

      <button class="nav-mobile-toggle" aria-label="Open menu" aria-expanded="false">&#9776;</button>
    </div>
  </header>

  <main>
    <section class="page-title-wrap">
      <div class="container page-title-inner">
        <span class="meta-badge">MEMBERS</span>
        <h1 class="page-title">People</h1>
        <p class="page-subtitle" id="members-count">Loading members...</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="filter-row">
          <div class="filter-tabs members-tabs" role="tablist" aria-label="Member category tabs">
            <button class="tab tab--active" data-tab="bio" type="button">Bio</button>
            <button class="tab" data-tab="finance" type="button">Finance</button>
          </div>

          <div>
            <label class="filter-label" for="member-role-filter">Role</label>
            <select id="member-role-filter" class="filter-select">
              <option value="All">All</option>
              <option value="mentor">Mentors</option>
              <option value="member">Members</option>
            </select>
          </div>
        </div>

        <div id="members-container" aria-live="polite"></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer__minimal">
      <span class="footer-contact-label">Contact us</span>
      <a class="footer-email" href="mailto:brt-srt@neu.edu.vn">brt-srt@neu.edu.vn</a>
    </div>
  </footer>

  <script src="assets/js/render.js"></script>
  <script src="assets/js/map.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', initMembersPage);
  </script>
</body>
</html>
