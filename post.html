<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News</title>
  <meta name="description" content="News and announcements from BRT-SRT Lab.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components.css">
</head>
<body>
  <header class="navbar">
    <div class="navbar__inner">
      <a href="index.html" class="nav-logo" aria-label="Bio Research Team Home">
        <span class="nav-logo__icons" aria-hidden="true">
          <img class="nav-logo__icon" src="assets/images/bio-lab-logo.png" alt="Bio Lab Logo" width="32" height="32">
        </span>
        <span class="nav-logo__meta">
          <span class="nav-logo__text">Bio Research Team</span>
          <span class="nav-logo__sub">National Economics University</span>
        </span>
      </a>

      <ul class="nav-links" role="list">
        <li><a href="post.html" class="active">News</a></li>
        <li><a href="publication.html">Publication</a></li>
        <li><a href="members.html">Members</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="mailto:brt-srt@neu.edu.vn?subject=Login%20Request" class="btn btn-primary nav-login">Login</a></li>
      </ul>

      <button class="nav-mobile-toggle" aria-label="Open menu" aria-expanded="false">&#9776;</button>
    </div>
  </header>

  <main>
    <section class="page-title-wrap">
      <div class="container page-title-inner">
        <span class="meta-badge">NEWS</span>
        <h1 class="page-title">Lab News</h1>
        <p class="page-subtitle" id="news-count">Loading news...</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="filter-row">
          <div id="news-tabs" class="filter-tabs" role="tablist" aria-label="News categories"></div>
          <div class="search-wrap">
            <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.35-4.35"></path>
            </svg>
            <input id="news-search" class="search-input" type="search" placeholder="Search title or content" aria-label="Search news">
          </div>
        </div>

        <div id="news-list" class="news-list" aria-live="polite"></div>
        <div id="news-pagination" class="pagination" aria-label="News pagination"></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer__minimal">
      <span class="footer-contact-label">Contact us</span>
      <a class="footer-email" href="mailto:brt-srt@neu.edu.vn">brt-srt@neu.edu.vn</a>
    </div>
  </footer>

  <script src="assets/js/render.js"></script>
  <script src="assets/js/filter.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', initNewsPage);
  </script>
</body>
</html>
