<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components.css">
  <style>
    .not-found { min-height: 100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:2rem; }
    .not-found h1 { font-size: clamp(3rem, 8vw, 7rem); color: var(--color-primary); margin-bottom: 0.5rem; }
    .not-found p { color: var(--color-text-muted); margin-bottom: 1rem; }
  </style>
</head>
<body>
  <main class="not-found">
    <div>
      <h1>404</h1>
      <h2>Page Not Found</h2>
      <p>The page you requested does not exist.</p>
      <a class="btn btn-primary" href="index.html">Back to Home</a>
    </div>
  </main>
</body>
</html>
