<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Area</title>
  <meta name="description" content="Research posts from BRT-SRT Lab.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/tokens.css">
  <link rel="stylesheet" href="assets/css/base.css">
  <link rel="stylesheet" href="assets/css/components.css">
</head>
<body>
  <header class="navbar">
    <div class="navbar__inner">
      <a href="index.html" class="nav-logo" aria-label="Bio Research Team Home">
        <span class="nav-logo__icons" aria-hidden="true">
          <img class="nav-logo__icon" src="assets/images/BRT.jpg" alt="" width="32" height="32">
          <img class="nav-logo__icon" src="assets/images/SRT.jpg" alt="" width="32" height="32">
        </span>
        <span class="nav-logo__meta">
          <span class="nav-logo__text">Bio Research Team</span>
          <span class="nav-logo__sub">National Economics University</span>
        </span>
      </a>

      <ul class="nav-links" role="list">
        <li><a href="post.html">News</a></li>
        <li><a href="publication.html">Publication</a></li>
        <li><a href="members.html">Members</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="mailto:brt-srt@neu.edu.vn?subject=Login%20Request" class="btn btn-primary nav-login">Login</a></li>
      </ul>

      <button class="nav-mobile-toggle" aria-label="Open menu" aria-expanded="false">&#9776;</button>
    </div>
  </header>

  <main>
    <section class="page-title-wrap">
      <div class="container page-title-inner">
        <a href="index.html#research-areas" class="area-back">← Research Areas</a>
        <span class="meta-badge">RESEARCH AREA</span>
        <h1 class="page-title" id="area-title">Loading...</h1>
        <p class="page-subtitle" id="area-desc"></p>
      </div>
    </section>

    <section class="area-banner-wrap">
      <div class="container">
        <img id="area-banner" class="area-banner" src="" alt="" hidden>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="section-header">
          <h2 class="section-title">Research Posts</h2>
          <p class="section-subtitle" id="area-post-count"></p>
        </div>
        <div id="area-posts-list" class="area-posts-list" aria-live="polite"></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer__minimal">
      <span class="footer-contact-label">Contact us</span>
      <a class="footer-email" href="mailto:brt-srt@neu.edu.vn">brt-srt@neu.edu.vn</a>
    </div>
  </footer>

  <script src="assets/js/render.js"></script>
  <script>
    async function initResearchAreaPage() {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('slug');

      let lab;
      try {
        lab = await fetchData('lab.json');
      } catch (e) {
        console.error('initResearchAreaPage:', e);
        return;
      }

      const area = (lab.research_areas || []).find((a) => a.slug === slug);

      if (!area) {
        document.querySelector('#area-title').textContent = 'Research area not found';
        return;
      }

      document.title = `${area.title} | ${lab.short_name || lab.name || 'Lab'}`;
      document.querySelector('#area-title').textContent = area.title;
      document.querySelector('#area-desc').textContent = area.desc || '';

      const banner = document.querySelector('#area-banner');
      if (area.image) {
        banner.src = area.image;
        banner.alt = area.title;
        banner.hidden = false;
      }

      const posts = area.posts || [];
      const countEl = document.querySelector('#area-post-count');
      if (countEl) countEl.textContent = `${posts.length} post${posts.length !== 1 ? 's' : ''}`;

      const listEl = document.querySelector('#area-posts-list');
      if (!listEl) return;

      if (posts.length === 0) {
        listEl.innerHTML = `
          <div class="empty-state">
            <div class="empty-state__icon">-</div>
            <p class="empty-state__text">No posts yet for this research area.</p>
          </div>`;
        return;
      }

      listEl.innerHTML = posts.map((post, i) => {
        const authors = post.authors || [];
        const lead = authors[0] || '';
        const rest = authors.slice(1).join(', ');
        const num = String(i + 1).padStart(2, '0');

        return `
          <article class="card area-post-item">
            <span class="paper-index">${num}</span>
            <div class="paper-main">
              <h3 class="paper-title">
                <a href="${sanitize(post.link || '#')}" target="_blank" rel="noopener noreferrer">
                  ${sanitize(post.title || 'Untitled')}
                </a>
              </h3>
              <p class="paper-authors">
                ${lead ? `<span class="lead-author">${sanitize(lead)}</span>` : ''}
                ${rest ? `, ${sanitize(rest)}` : ''}
              </p>
              <div class="paper-badges">
                <span class="paper-chip ${post.type === 'Journal' ? 'paper-chip--journal' : 'paper-chip--conference'}">${sanitize(post.type || 'Post')}</span>
                <span class="paper-meta-inline paper-venue">${sanitize(post.venue || '')}</span>
                <span class="paper-meta-inline">${sanitize(String(post.year || ''))}</span>
              </div>
            </div>
            <a class="area-post-read" href="${sanitize(post.link || '#')}" target="_blank" rel="noopener noreferrer" aria-label="Read post">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 12h14M12 5l7 7-7 7"/>
              </svg>
            </a>
          </article>`;
      }).join('');
    }

    document.addEventListener('DOMContentLoaded', initResearchAreaPage);
  </script>
</body>
</html>
